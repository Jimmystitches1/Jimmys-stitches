<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jimmy's Stitches</title>  <!-- Google Font -->  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #0f0f0f; color: #fff; }

    header {
      background: rgba(0,0,0,0.8);
      padding: 15px 20px;
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    header h1 { text-align: center; font-size: 24px; }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    nav a:hover { color: #bbb; }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(to right, #111, #1a1a1a);
    }

    .hero h2 { font-size: 32px; margin-bottom: 10px; }
    .hero p { color: #aaa; }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 20px;
      background: #fff;
      color: #000;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover { background: #ccc; }

    .section { padding: 50px 20px; }

    .section h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 26px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 15px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover { transform: scale(1.03); }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
      text-align: center;
    }

    .card-content h3 { margin-bottom: 5px; }
    .card-content p { color: #aaa; font-size: 14px; }

    .price { margin: 10px 0; font-weight: bold; }

    footer {
      text-align: center;
      padding: 20px;
      background: #000;
      margin-top: 40px;
      font-size: 14px;
      color: #aaa;
    }

  </style></head><body><header>
  <h1>Jimmy's Stitches</h1>
  <nav>
    <a href="#streetwear">Streetwear</a>
    <a href="#senator">Senator</a>
    <a href="#contact">Order</a>
  </nav>
</header><section class="hero">
  <h2>Luxury Streetwear & Native Fits</h2>
  <p>Built from passion. Styled for confidence.</p>
  <a href="#contact" class="btn">Shop Now</a>

  </div>
</div>
